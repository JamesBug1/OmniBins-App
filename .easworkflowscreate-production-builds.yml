# .eas/workflows/create-production-builds.yml
version: 1
jobs:
  build:
    description: "Build the app for production"
    runs-on: ubuntu-latest  # This is the runner type, you can use macos-latest for iOS if needed
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v2
      - name: "Setup Node.js"
        uses: actions/setup-node@v2
        with:
          node-version: '16'  # Change this to your preferred Node version
      - name: "Install dependencies"
        run: npm install
      - name: "Run EAS Build"
        run: eas build --platform android --profile production  # or ios