version: 1

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build_android:
    name: Build Android
    type: build
    env:
      EXPO_DEBUG: "1"
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS
    type: build
    env:
      EXPO_DEBUG: "1"
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android build
    needs:
      - build_android
    type: submit
    env:
      EXPO_DEBUG: "1"
    params:
      build_id: '${{ needs.build_android.outputs.build_id }}'

  submit_ios:
    name: Submit iOS build
    needs:
      - build_ios
    type: submit
    env:
      EXPO_DEBUG: "1"
    params:
      build_id: '${{ needs.build_ios.outputs.build_id }}'